name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "love_popup.py"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    name: Build love_popup.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name love_popup
          love_popup.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: love_popup-windows-exe
          path: dist/love_popup.exe
          if-no-files-found: error

